<!DOCTYPE html>
<html>
<head>
    <title>Iran 3D Pillar Monitor</title>
    <script src="https://unpkg.com/globe.gl"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; color: white; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        #ui h1 { margin: 0; font-size: 22px; color: #ff4d4d; text-shadow: 0 0 15px rgba(255,0,0,0.6); letter-spacing: 2px; }
        #status { font-size: 13px; color: #aaa; margin-top: 5px; }

        /* --- THE PILLAR STYLE --- */
        .pillar-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            pointer-events: auto;
            cursor: pointer;
        }

        .pillar-beam {
            width: 2px;
            height: 40px; /* Length of the pillar */
            background: linear-gradient(to top, rgba(255, 77, 77, 1), rgba(255, 77, 77, 0));
            box-shadow: 0 0 10px rgba(255, 77, 77, 0.8);
            transition: transform 0.2s;
        }

        .pillar-base {
            width: 6px;
            height: 6px;
            background: #ff4d4d;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff4d4d;
        }

        .pillar-container:hover .pillar-beam {
            width: 4px;
            box-shadow: 0 0 20px #ff4d4d;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h1>IRAN SATELLITE FEED</h1>
        <div id="status">Scanning regional data pillars...</div>
    </div>
    <div id="globeViz"></div>

    <script>
        const world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
            .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
            .showAtmosphere(true)
            .atmosphereColor('lightskyblue')
            
            // --- PILLAR IMPLEMENTATION ---
            .htmlElementsData([]) // Start empty
            .htmlElement(d => {
                const el = document.createElement('div');
                el.className = 'pillar-container';
                el.innerHTML = `
                    <div class="pillar-beam"></div>
                    <div class="pillar-base"></div>
                `;
                el.onclick = () => window.open(d.url, '_blank');
                
                // Add tooltip on hover
                el.title = `${d.source}: ${d.title}`;
                return el;
            });

        // Focus on Iran
        setTimeout(() => {
            world.pointOfView({ lat: 32.42, lng: 53.68, altitude: 2.2 }, 3000);
        }, 500);

        // Fetch Data
        const API_KEY = 'PASTE_YOUR_KEY_HERE'; 
        const GNEWS_URL = `https://gnews.io/api/v4/search?q=Iran&lang=en&max=10&apikey=${API_KEY}`;

        fetch(GNEWS_URL)
            .then(res => res.json())
            .then(data => {
                if(!data.articles) return;

                const pillars = data.articles.map((art) => ({
                    lat: 32.42 + (Math.random() - 0.5) * 6, 
                    lng: 53.68 + (Math.random() - 0.5) * 8,
                    title: art.title,
                    source: art.source.name,
                    url: art.url
                }));

                world.htmlElementsData(pillars);
                document.getElementById('status').innerHTML = `LIVE: ${pillars.length} pillars active.`;
            })
            .catch(() => {
                document.getElementById('status').innerHTML = "SYSTEM READY: Monitoring active.";
            });
    </script>
</body>
</html>
